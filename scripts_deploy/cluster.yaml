# SwarmPilot Cluster Configuration
# Copy this file to each node and edit as needed.

cluster:
  # Head node IP (runs Planner + Schedulers)
  head_node: "10.0.0.1"

  # PyLet cluster configuration
  pylet:
    head_port: 5100               # PyLet head listen port
    head_url: "http://10.0.0.1:5100"
    backend: "vllm"               # vllm | sglang
    cpu_per_instance: 1
    deploy_timeout: 1800          # seconds (30min, 80B models need longer to load)

    # Worker resources (advertised to PyLet scheduler)
    worker:
      port_start: 5300            # first worker HTTP port
      cpu: 8                      # CPU cores per worker
      gpu: 8                      # GPUs per worker
      memory: 65536               # RAM (MB) per worker

  # Planner service
  planner:
    port: 8002

  # Models to deploy (one Scheduler per model)
  # Layout: 2 nodes for 8B (16 instances), 1 node for 80B (4 instances)
  models:
    - model_id: "Qwen/Qwen3-VL-8B-Instruct"
      scheduler_port: 8010
      gpu_per_instance: 1
      replicas: 16                # 2 nodes × 8 GPU = 16

    - model_id: "Qwen/Qwen3-Next-80B-A3B-Instruct-FP8"
      scheduler_port: 8020
      gpu_per_instance: 2         # tensor parallel across 2 GPUs
      replicas: 4                 # 1 node × 8 GPU ÷ 2 = 4
      extra_args: "--max-model-len 8192"

  # Cluster nodes (3 active, 1 has conflicting vLLM processes)
  nodes:
    - host: "10.0.0.1"
      gpus: 8
    - host: "10.0.0.2"
      gpus: 8
    - host: "10.0.0.3"
      gpus: 8
