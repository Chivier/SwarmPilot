name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  PYTHONUNBUFFERED: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache virtual environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Verify installation
        run: uv pip list

      - name: Run scheduler tests
        run: uv run pytest tests/scheduler/ -v --tb=short

      - name: Run planner tests
        run: uv run pytest tests/planner/ -v --tb=short

      - name: Run predictor tests
        run: uv run pytest tests/predictor/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache virtual environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.11-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Verify installation
        run: uv pip list

      - name: Check Python syntax
        run: |
          find . -name "*.py" \
            -not -path "./.venv/*" \
            -not -path "./experiments/*" \
            -not -path "./.git/*" \
            -print0 | xargs -0 -n 50 uv run python -m py_compile
