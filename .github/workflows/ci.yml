name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache uv virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ matrix.python-version }}-
            venv-${{ runner.os }}-

      - name: Cache pytest cache
        uses: actions/cache@v4
        with:
          path: |
            .pytest_cache
            */tests/.pytest_cache
            */.pytest_cache
          key: pytest-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/test_*.py', '**/*_test.py') }}
          restore-keys: |
            pytest-${{ runner.os }}-${{ matrix.python-version }}-
            pytest-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run scheduler tests
        run: uv run pytest scheduler/tests/ -v --tb=short
        continue-on-error: false

      - name: Run instance tests
        run: uv run pytest instance/tests/ -v --tb=short
        continue-on-error: false

      - name: Run planner tests
        run: uv run pytest planner/tests/ -v --tb=short
        continue-on-error: false

      - name: Run predictor tests (if exists)
        run: |
          if [ -d "predictor/tests" ]; then
            uv run pytest predictor/tests/ -v --tb=short
          else
            echo "No predictor tests directory found, skipping..."
          fi
        continue-on-error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache uv virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.11-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-3.11-
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Check Python syntax
        run: uv run python -m py_compile $(find . -name "*.py" -not -path "./.venv/*" -not -path "./experiments/*")
