services:
  ocr_model:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME:-ocr_model}
    ports:
      - "${MODEL_PORT:-8000}:8000"
    environment:
      - MODEL_ID=${MODEL_ID:-ocr_model}
      - INSTANCE_ID=${INSTANCE_ID:-instance-default}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OCR_DEFAULT_LANGUAGES=${OCR_DEFAULT_LANGUAGES:-en}
      - OCR_GPU_ENABLED=${OCR_GPU_ENABLED:-false}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Resource limits for CPU-only OCR
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
