# Deep Research Workflow - Real Cluster Mode Configuration

# Experiment metadata
experiment_name: "deep_research_real"
experiment_type: "deep_research"
mode: "real"
description: "Deep Research workflow on real cluster with deployed models"

# Quality of Service (QoS) parameters
qos:
  qps: 1.0                # Query per second rate
  duration: 600           # Experiment duration in seconds (10 minutes)
  num_workflows: 100      # Total number of workflows (lower for real mode)

# Workflow-specific parameters
workflow:
  fanout_count: 3         # Number of B1/B2 tasks per workflow

# Scheduler endpoints (real cluster - update with actual IPs)
schedulers:
  scheduler_a:
    host: "10.0.0.10"     # Replace with actual scheduler A IP
    port: 8100
    url: "http://10.0.0.10:8100"

  scheduler_b:
    host: "10.0.0.11"     # Replace with actual scheduler B IP
    port: 8101
    url: "http://10.0.0.11:8101"

# Model configurations (real deployed models)
models:
  model_a_id: "llm_service_small_model"      # A task (research planning)
  model_b1_id: "llm_service_medium_model"    # B1 tasks (research execution)
  model_b2_id: "llm_service_medium_model"    # B2 tasks (analysis)
  model_merge_id: "llm_service_large_model"  # Merge task (synthesis)

# Task parameters (real mode)
task_params:
  # LLM parameters
  max_tokens: 512                            # Maximum tokens for generation
  platform: "linux"                          # Platform identifier

# Data source
data:
  topics_file: "research_topics.json"        # Path to research topics

# Prompt templates (real mode)
prompts:
  a_template: "Generate a comprehensive research plan for topic: {topic}. Break it down into {fanout_count} specific subtopics to investigate."
  b1_template: "Conduct detailed research on subtopic: {subtopic}. Provide comprehensive findings and key insights."
  b2_template: "Analyze and summarize research findings for: {subtopic}. Extract the most important conclusions and evidence."
  merge_template: "Synthesize all research findings into a final comprehensive report. Research areas covered: {summary}. Provide a cohesive analysis that integrates all findings."

# Output configuration
output:
  dir: "output"                              # Output directory
  metrics_file: "metrics.json"               # Metrics output filename
  log_level: "INFO"                          # Logging level

# Performance tuning (optional)
performance:
  rate_limiter_burst_size: null              # Burst size (default: qps * 2)
  websocket_timeout: 600                     # WebSocket timeout (longer for research)
  submission_queue_size: 1000                # Task submission queue size
  merge_sync_timeout: 120                    # Timeout for merge synchronization
  retry_attempts: 3                          # Retry attempts for failed submissions
  retry_delay: 1.0                           # Delay between retries in seconds

# Service health check (optional)
health_check:
  enabled: true                              # Enable health checks before starting
  endpoints:
    - "http://10.0.0.10:8100/health"
    - "http://10.0.0.11:8101/health"
  timeout: 10                                # Health check timeout in seconds

# Advanced options (optional)
advanced:
  enable_metrics_export: true                # Export metrics to file
  enable_console_output: true                # Show real-time console output
  enable_detailed_logging: false             # Enable detailed debug logging
  enable_token_estimation: true              # Estimate token counts in metadata
  enable_sync_debugging: false               # Debug B1/B2 synchronization

# Deployment information (for reference)
deployment:
  cluster_name: "production"
  deployment_date: "2024-01-15"
  model_versions:
    llm_service_small_model: "v1.2.3"
    llm_service_medium_model: "v1.3.0"
    llm_service_large_model: "v1.4.1"

# Workflow structure (for reference)
workflow_structure:
  description: |
    Deep Research workflow structure:
    1. A task: Generate research plan with LLM
    2. Fan-out to n B1 tasks: Execute parallel research with medium LLMs
    3. Each B1 → B2 (1:1 mapping): Analyze findings
    4. Wait for all B2 to complete (barrier synchronization)
    5. Merge task: Synthesize final report with large LLM

  parallelism: "fanout_count"                # Parallelism controlled by fanout_count
  synchronization: "barrier"                 # Barrier synchronization before merge
  token_estimation: true                     # Token counts estimated for performance prediction
