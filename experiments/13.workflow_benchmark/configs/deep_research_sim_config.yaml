# Deep Research Workflow - Simulation Mode Configuration

# Experiment metadata
experiment_name: "deep_research_simulation"
experiment_type: "deep_research"
mode: "simulation"
description: "Deep Research workflow simulation with fanout/fan-in pattern"

# Quality of Service (QoS) parameters
qos:
  qps: 1.0                # Query per second rate (lower than Text2Video)
  duration: 600           # Experiment duration in seconds (10 minutes)
  num_workflows: 600      # Total number of workflows to execute

# Workflow-specific parameters
workflow:
  fanout_count: 3         # Number of B1/B2 tasks per workflow (parallelism factor)

# Scheduler endpoints (simulation mode uses local services)
schedulers:
  scheduler_a:
    host: "127.0.0.1"
    port: 8100
    url: "http://127.0.0.1:8100"

  scheduler_b:
    host: "127.0.0.1"
    port: 8101
    url: "http://127.0.0.1:8101"

# Model configurations
models:
  model_a_id: "llm_service_small_model"      # A task (research planning)
  model_b1_id: "llm_service_medium_model"    # B1 tasks (research execution)
  model_b2_id: "llm_service_medium_model"    # B2 tasks (analysis)
  model_merge_id: "llm_service_large_model"  # Merge task (synthesis)

# Task parameters (simulation mode)
task_params:
  # Sleep time range for simulated task execution
  sleep_time_min: 5.0     # Minimum sleep time in seconds
  sleep_time_max: 15.0    # Maximum sleep time in seconds

# Data source
data:
  topics_file: "research_topics.json"   # Path to research topics (optional)
  # If not provided, topics will be auto-generated

# Output configuration
output:
  dir: "output"                         # Output directory
  metrics_file: "metrics.json"          # Metrics output filename
  log_level: "INFO"                     # Logging level

# Performance tuning (optional)
performance:
  rate_limiter_burst_size: null         # Burst size (default: qps * 2)
  websocket_timeout: 600                # WebSocket timeout (longer for research)
  submission_queue_size: 1000           # Task submission queue size
  merge_sync_timeout: 120               # Timeout for merge synchronization

# Advanced options (optional)
advanced:
  enable_metrics_export: true           # Export metrics to file
  enable_console_output: true           # Show real-time console output
  enable_detailed_logging: false        # Enable detailed debug logging
  enable_sync_debugging: false          # Debug B1/B2 synchronization

# Workflow structure (for reference)
workflow_structure:
  description: |
    Deep Research workflow structure:
    1. A task: Generate research plan
    2. Fan-out to n B1 tasks: Execute parallel research
    3. Each B1 → B2 (1:1 mapping): Analyze findings
    4. Wait for all B2 to complete
    5. Merge task: Synthesize final report

  parallelism: "fanout_count"           # Parallelism controlled by fanout_count
  synchronization: "barrier"            # Barrier synchronization before merge
